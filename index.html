<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem Merenda Inteligente</title>
    <link rel="stylesheet" href="merenda.css">
</head>
<body onload="iniciarTotem()">

    <div class="totem-container">
        <header class="painel-info">
            <div class="titulo-setor">
                <h1>SISTEMA DE MERENDA</h1>
                <div id="statusCatraca" class="status-badge bloqueado">INICIALIZANDO...</div>
            </div>
            
            <div class="cardapio-grade">
                <div class="card-menu">
                    <span class="label">☕ CAFÉ DA MANHÃ</span>
                    <strong id="menuCafe">Pão com Manteiga e Café com Leite</strong>
                </div>
                <div class="card-menu">
                    <span class="label">🍛 ALMOÇO DO DIA</span>
                    <strong id="menuAlmoco">Arroz, Feijão e Frango Grelhado</strong>
                </div>
            </div>
        </header>

        <main class="area-interativa">
            <div id="containerVideo">
                <video id="videoEscola" autoplay muted playsinline></video>
                </div>

            <nav class="botoes-refeicao">
                <button id="btnCafe" class="btn-acao">REGISTRAR CAFÉ</button>
                <button id="btnAlmoco" class="btn-acao">REGISTRAR ALMOÇO</button>
                <button id="btnAmbos" class="btn-acao">AMBOS</button>
            </nav>
        </main>

        <footer class="rodape-adm">
            <div class="stats">
                <span>Total Hoje: <b id="contTotal">0</b></span>
            </div>
            <div class="botoes-adm">
                <button onclick="configurarMenu()" class="btn-subtle">Configurar Menu</button>
                <button id="btnExportar" class="btn-subtle">Relatório CSV</button>
                <button id="btnReset" class="btn-subtle">Zerar</button>
            </div>
        </footer>

        <div id="bibliotecaFotos" style="display: none;">
            <img id="Kaio" src="kaio.jpg" data-turma="3º IPI">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
