<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem Merenda V2</title>
    
    <link rel="stylesheet" href="merenda.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    
    <script defer src="script.js"></script>
</head>
<body>

    <div class="totem-container">
        <header class="header-totem">
            <div class="status-box">
                <div id="statusCatraca" class="status-badge aguardando">CARREGANDO IA...</div>
                <div class="contagem">Alunos Atendidos: <span id="contTotal">0</span></div>
            </div>
            <div class="cardapio-display">
                <div class="item-menu"><strong>CAFÉ:</strong> <span id="menuCafe">Pão com Ovo e Leite</span></div>
                <div class="item-menu"><strong>ALMOÇO:</strong> <span id="menuAlmoco">Feijoada com Farofa</span></div>
            </div>
        </header>

        <main class="viewport-camera">
            <div id="containerVideo">
                <video id="videoEscola" autoplay muted playsinline></video>
            </div>
        </main>

        <footer class="controles-aluno">
            <div class="botoes-grade">
                <button class="btn-opcao" onclick="selecionar('CAFÉ')">☕ PEDIR CAFÉ</button>
                <button class="btn-opcao" onclick="selecionar('ALMOÇO')">🍛 PEDIR ALMOÇO</button>
                <button class="btn-opcao" onclick="selecionar('AMBOS')">🍽️ AMBOS</button>
            </div>
        </footer>

        <div id="bibliotecaFotos" style="display: none;">
            <img id="Kaio" src="kaio.jpg" data-turma="3º IPI" crossorigin="anonymous">
        </div>
    </div>

</body>
</html>
