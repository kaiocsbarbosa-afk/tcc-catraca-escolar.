<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem de Merenda - Escola</title>
    <link rel="stylesheet" href="merenda.css">
</head>
<body onload="iniciarAutomatico()">

    <div class="painel-principal">
        <header>
            <h1>Totem de Merenda</h1>
            <p>Aproxime-se para identificação</p>
        </header>

        <div class="dashboard-contadores">
            <div class="card-contador">Cafés: <span id="contCafe">0</span></div>
            <div class="card-contador">Almoços: <span id="contAlmoco">0</span></div>
        </div>

        <div id="statusCatraca" class="status bloqueado">CARREGANDO SISTEMA...</div>

        <div class="painel-escolha">
            <h2>O que vamos comer?</h2>
            <div class="botoes-refeicao">
                <button id="btnCafe" class="btn-opcao">☕ CAFÉ</button>
                <button id="btnAlmoco" class="btn-opcao">🍛 ALMOÇO</button>
                <button id="btnAmbos" class="btn-opcao">🍽️ AMBOS</button>
            </div>
        </div>

        <div id="containerVideo">
            <video id="videoEscola" autoplay muted playsinline width="640" height="480"></video>
        </div>

        <div class="controles-adm">
            <button id="btnReset" class="btn-mini">Zerar Turno</button>
            <button id="btnExportar" class="btn-mini">Exportar CSV</button>
        </div>

        <div class="historico-container">
            <table id="tabelaHistorico">
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <div id="fotosBiblioteca" style="display: none;">
            <img id="Kaio" src="aluno.jpg" data-turma="3º IPI">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
