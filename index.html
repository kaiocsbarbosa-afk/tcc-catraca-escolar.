<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu TCC - Reconhecimento Facial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="painel-principal">
        <header>
            <h1>Sistema de Acesso Escolar</h1>

        <div id="statusCatraca" class="status bloqueado">

        <div class="controles">

        </div>
        
        <div id="containerVideo">
            <video id="videoEscola" autoplay muted width="640" height="480"></video>
        </div>

        <img id="fotoAluno" src="aluno.jpg" alt="Foto do Aluno">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    
    <script src="script.js"></script>
