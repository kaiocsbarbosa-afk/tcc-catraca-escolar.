<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem Merenda Inteligente - TCC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="iniciarTotem()">

    <div class="totem-container">
        <header class="topo-totem">
            <div class="info-principal">
                <h1>TOTEM DE MERENDA</h1>
                <div id="statusCatraca" class="status-badge bloqueado">CARREGANDO...</div>
            </div>
            
            <div class="painel-cardapio">
                <div class="card-refeicao">
                    <span class="label">☕ CAFÉ DA MANHÃ</span>
                    <strong id="menuCafe">Leite, Pão e Fruta</strong>
                </div>
                <div class="card-refeicao">
                    <span class="label">🍛 ALMOÇO DO DIA</span>
                    <strong id="menuAlmoco">Arroz, Feijão e Carne</strong>
                </div>
            </div>
        </header>

        <main class="espaco-camera">
            <div id="containerVideo">
                <video id="videoEscola" autoplay muted playsinline></video>
                </div>
        </main>

        <footer class="controles-pedido">
            <p class="instrucao">Selecione o que vai comer agora:</p>
            <div class="grade-botoes">
                <button class="btn-totem" id="btnCafe">SOLICITAR CAFÉ</button>
                <button class="btn-totem" id="btnAlmoco">SOLICITAR ALMOÇO</button>
                <button class="btn-totem" id="btnAmbos">SOLICITAR AMBOS</button>
            </div>
        </footer>

        <div class="barra-adm">
            <div class="contador">Registros Hoje: <b id="contTotal">0</b></div>
            <div class="acoes-adm">
                <button onclick="mudarCardapio()">Configurar Cardápio</button>
                <button id="btnExportar">Baixar Relatório</button>
                <button id="btnReset">Reiniciar</button>
            </div>
        </div>

        <div id="bibliotecaFotos" style="display: none;">
            <img id="Kaio" src="kaio.jpg" data-turma="3º Ano IPI">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
